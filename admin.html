<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Barbearia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    
    <div class="top-bar">
        <button class="menu-hamburguer" onclick="toggleMenu()">☰</button>
        <a href="index.html" style="color:var(--danger); text-decoration:none; font-weight:bold;">SAIR</a>
    </div>

    <nav class="side-menu" id="sideMenu">
        <h3>Admin</h3>
        <button class="menu-item" onclick="baixarRelatorioCSV()">📊 Baixar Relatório (CSV)</button>
        <button class="menu-item" onclick="openModal('modalMsg')">✉️ Notificar Cliente</button>
    </nav>

    <div style="padding: 80px 20px; max-width: 600px; margin: 0 auto;">
        <h2 style="color:var(--gold); text-align:center">Painel Admin</h2>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px">
            <div style="background:var(--card); padding:15px; border-radius:12px; text-align:center; border-bottom:3px solid var(--gold)">
                <small>PENDENTE</small><p id="totalP" style="font-size:1.5rem; margin:5px 0">R$ 0</p>
            </div>
            <div style="background:var(--card); padding:15px; border-radius:12px; text-align:center; border-bottom:3px solid var(--success)">
                <small>CONCLUÍDO</small><p id="totalC" style="font-size:1.5rem; margin:5px 0">R$ 0</p>
            </div>
        </div>

        <button class="btn-primary btn-filter-admin" onclick="toggleCalAdmin()">FILTRAR POR DATA</button>
        
        <div id="cal-admin" style="display:none; background:#222; padding:15px; border-radius:10px; margin-bottom:15px">
            <div class="cal-grid" id="grid-admin"></div>
        </div>

        <div class="tab-nav">
            <button id="tab-agenda" class="tab-btn active" onclick="setTab('agenda')">AGENDA</button>
            <button id="tab-his" class="tab-btn" onclick="setTab('historico')">HISTÓRICO</button>
        </div>

        <div id="lista-admin"></div>
    </div>

    <div id="modalMsg" class="modal" onclick="closeOutside(event, 'modalMsg')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Notificar Cliente</h3>
            <select id="msg-destino"></select>
            <textarea id="msg-texto" placeholder="Mensagem..." style="height:100px"></textarea>
            <button class="btn-primary" onclick="enviarNotif()">ENVIAR</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
